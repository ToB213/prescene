presentation:
  width: 1280
  height: 720

slides:
  - id: intro
    nodes:
      - type: rect
        id: title-background
        transform:
          x: 60
          y: 40
          width: 1160
          height: 120

      - type: markdown
        id: title
        transform:
          x: 100
          y: 70
          width: 580
          height: 80
        classes:
          - title
        content: "# Presentation as Scene"

      - type: markdown
        id: description
        transform:
          x: 100
          y: 220
          width: 500
          height: 250
        content: |
          This is a simple example of a presentation as a scene.
          It shows how to create a presentation using the Prescene framework.
          The presentation consists of slides, each containing nodes such as text and shapes.

      - type: rect
        id: diagram
        transform:
          x: 700
          y: 220
          width: 400
          height: 250

  - id: conclusion
    nodes:
      - type: markdown
        id: conclusion-text
        transform:
          x: 100
          y: 100
          width: 1080
          height: 500
        content: |
          Thank you for viewing this presentation.
          We hope you found it informative and engaging.
          Feel free to explore the Prescene framework further to create your own presentations as scenes.
